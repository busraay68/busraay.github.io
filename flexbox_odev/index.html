<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Lab Uygulaması</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        
        <nav class="navbar">
            <div class="logo">Logo</div>
            <ul class="nav-links">
                <li><a href="#">Link 1</a></li>
                <li><a href="#">Link 2</a></li>
                <li><a href="#">Link 3</a></li>
                <li><a href="#">Link 4</a></li>
            </ul>
        </nav>

        <section class="hero">
            <div class="hero-content">
                <h1>Metin Başlığı</h1>
                <p>Burada hero açıklaması yer alıyor.</p>
                <button>Buton</button>
            </div>
            <div class="hero-placeholder">
                Görsel Kutusu (Placeholder)
            </div>
        </section>

        <section class="cards">
            <div class="card">Kart 1</div>
            <div class="card">Kart 2</div>
            <div class="card">Kart 3</div>
            <div class="card">Kart 4</div>
            <div class="card">Kart 5</div>
            <div class="card">Kart 6</div>
        </section>

        <section class="grow-section">
            <div class="box1">Kutu 1 (Grow: 1)</div>
            <div class="box2">Kutu 2 (Grow: 2)</div>
            <div class="box3">Kutu 3 (Grow: 1)</div>
        </section>

        <footer class="footer">
            <p>Footer Alanı</p>
        </footer>

    </div>

</body>
</html>
