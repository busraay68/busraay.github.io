<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lab Position - AI Chatbot Workshop</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    <div class="top-link">
        <a href="index.html">← Ana Sayfa</a>
    </div>

    <div class="card"> </div>
    font-family: Arial, sans-serif;
    background: #ffffff;
    padding: 40px;
}

/* ÜST LİNK */
.top-link a {
    text-decoration: none;
    background: #2563eb;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    display: inline-block;
    margin-bottom: 20px;
    transition: 0.3s ease; /* 13. Kural: transition */
    cursor: pointer; /* 13. Kural: cursor değişimi (1) */
}

.top-link a:hover {
    background: #1d4ed8;
    transform: scale(1.05); /* 13. Kural: hover animasyonu */
}

/* ANA KART */
.card {
    position: relative; /* 9. ve 10. Kural */
    width: 600px;
    height: 450px;
    margin: auto;
    background: #eef2ff;
    border-radius: 15px;
    padding: 60px 40px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.card h1 {
    position: relative;
}

/* AÇIKLAMA */
.card p {
    margin-top: 20px;
    width: 55%;
    color: #475569;
    line-height: 1.6;
}

/* ROZET GENEL */
.badge {
    position: absolute; /* 11. Kural */
    padding: 8px 15px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 13px;
    z-index: 10; /* 18. Kural: z-index (Üstte) */
    transition: 0.3s ease;
}

.badge1 {
    position: absolute;
    top: 15px;     /* BAŞLIĞA GÖRE */
    left: 140px;   /* CHAT üstüne getir */

    background: #fbbf24;
    color: #78350f;

    transform: translateY(-50%);
}
.badge2 {
    position: absolute;
    top: 15px;     /* AYNI HİZA */
    right: 40px;

    background: #dcfce7;
    color: #166534;

    transform: translateY(-50%);
}

.badge2:hover {
    background: #bbf7d0;
}

/* SON KAYIT */
.badge3 {
    bottom: 30px;
    right: 30px;
    background: #dbeafe;
    color: #1e40af;
    animation: bounce 2s infinite ease-in-out; /* 17. Kural: @keyframes */
    cursor: crosshair;
}

/* KONUM (Konum Korundu) */
.location-box {
    position: absolute;
    right: 40px;
    bottom: 140px;
    background: white;
    padding: 15px 25px;
    border-radius: 10px;
    border-left: 4px solid #fbbf24;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    z-index: 5;
    transition: 0.3s;
}

.location-box:hover {
    transform: translateX(-5px);
    background: #fffbeb;
}

/* ARKA DAİRE */
.circle {
    position: absolute;
    width: 280px;
    height: 280px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    right: -50px;
    bottom: 20px;
    z-index: 0;
}

/* FIXED */
.fixed-menu {
    position: fixed; /* 12. Kural: fixed öğe */
    bottom: 30px;
    left: 30px;
    background: #1e293b;
    color: white;
    padding: 14px 22px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    transition: 0.2s;
    z-index: 100;
}

.fixed-menu:hover {
    background: #334155;
}

.fixed-menu:active {
    transform: scale(0.95); /* 16. Kural: active efekti */
}

/* ANİMASYON */
@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

footer {
    text-align: center;
    margin-top: 40px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="top-link">
    <a href="index.html">← Ana Sayfa</a>
</div>

<div class="card">

    <div class="circle"></div>

    <div class="badge badge1">Ücretsiz</div>
    <div class="badge badge2">24 Nisan</div>
    <div class="badge badge3">Son Kayıt</div>

    <h1>Chatbot Atölyesi</h1>

    <p>
        Yapay zeka asistanları dünyayı nasıl değiştiriyor?
        Kendi chatbotunuzu tasarlamayı bu atölyede öğrenin.
    </p>

    <div class="location-box">
        <strong>Konum:</strong> Konferans Salonu
    </div>

</div>

<a href="#" class="fixed-menu">Yardımcı Menü</a>

<footer>
    2026 LAB Position Çalışması
</footer>

</body>
</html>
